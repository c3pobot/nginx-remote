# Enable on-the-fly Brotli compression
brotli on;

# Enable serving pre-compressed .br assets if they exist
brotli_static on;

# 4 is the recommended level for dynamic content (1-11 scale)
# Higher levels consume excessive CPU with diminishing returns
brotli_comp_level 4;

# Minimum file size to compress (in bytes)
brotli_min_length 256;

# Specific MIME types to compress (Never compress JPEGs/PNGs/MP4s)
brotli_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml;
